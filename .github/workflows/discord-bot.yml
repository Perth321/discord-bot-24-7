name: Discord Bot 24/7

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

concurrency:
  group: discord-bot-singleton
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: bot-standalone

      - name: Run Discord Bot
        run: node src/index.js
        working-directory: bot-standalone
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CONFIG_API_URL: ${{ secrets.CONFIG_API_URL }}
